name: test_and_lint_stable
on:
  push:
    branches:
      - master
      - 'feature/**'
  pull_request:
    branches:
      - master
      - 'feature/**'
jobs:
  test_stable:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{matrix.os}}
    steps:
      - uses: actions/checkout@v2
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"
      - run: zig build
      - run: zig build test
      - run: zig build install
        working-directory: benchmark

  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"
      - run: zig build test
      - run: zig build bootstrap
      - run: zig build test
      - run: zig build
      - run: git diff

  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"
      - run: zig build conformance-run
        working-directory: conformance
      - run: git diff --exit-code conformance/out/failing_tests.txt

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"
      - run: zig build benchmark
        working-directory: benchmark
      - run: zig build generate-dataset
        working-directory: benchmark
      
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"
      - run: zig fmt --check src/protobuf.zig
